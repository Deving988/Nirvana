name: Build Nirvana APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate debug keystore (it's gitignored, so CI needs to create it)
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore \
              -storepass android -alias androiddebugkey \
              -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Create .env with real API key (from GitHub Secrets)
        run: |
          cp .env.example .env
          if [ -n "${{ secrets.YOUTUBE_API_KEY }}" ]; then
            sed -i "s|YOUTUBE_API_KEY=.*|YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}|" .env
          fi

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nirvana-debug-apk
          path: app/build/outputs/apk/debug/*.apk
