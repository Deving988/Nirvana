<!DOCTYPE html>
<html>
<head>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3,
                    'modestbranding': 1,
                    'playsinline': 1,
                    'origin': 'https://appassets.androidplatform.net'
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            window.Android.onPlayerReady();
        }

        function onPlayerStateChange(event) {
            window.Android.onPlayerStateChange(event.data);
            if (event.data == 1) { // When playing
                try {
                    player.setPlaybackQuality('tiny'); // force lowest resolution 144p to save mobile data
                } catch(e) {}
            }
        }

        function onPlayerError(event) {
            window.Android.onPlayerError(event.data);
        }

        function playVideo(id) {
            if (id) {
                player.loadVideoById(id);
                try {
                    player.setPlaybackQuality('tiny');
                } catch(e) {}
            } else {
                player.playVideo();
            }
        }

        function pauseVideo() {
            player.pauseVideo();
        }

        function seekTo(seconds) {
            player.seekTo(seconds, true);
        }

        function getDuration() {
            return player.getDuration();
        }

        function getCurrentTime() {
            return player.getCurrentTime();
        }
    </script>
</body>
</html>
